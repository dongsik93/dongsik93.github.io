<div class="blog-palette-backdrop" data-blog-palette hidden>
  <section class="blog-palette" role="dialog" aria-modal="true" aria-label="포스트 검색">
    <div class="blog-palette__input">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
      <input type="search" data-blog-search-input placeholder="포스트 검색..." autocomplete="off" spellcheck="false">
      <kbd>ESC</kbd>
    </div>
    <div class="blog-palette__list" data-blog-search-results></div>
  </section>
</div>

<script type="application/json" id="blog-search-index">
[
  {% for post in site.posts %}
  {% assign first_tag = post.tags | first %}
  {% assign category = post.categories | first | default: post.category | default: first_tag | default: 'note' %}
  {
    "title": {{ post.title | jsonify }},
    "subtitle": {{ post.subtitle | default: '' | jsonify }},
    "category": {{ category | jsonify }},
    "tags": {{ post.tags | join: ' ' | jsonify }},
    "url": {{ post.url | prepend: site.baseurl | jsonify }},
    "date": {{ post.date | date: "%b %d, %Y" | upcase | jsonify }},
    "excerpt": {{ post.excerpt | strip_html | normalize_whitespace | truncate: 220 | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>
